<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0d10" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#fbfcfd" media="(prefers-color-scheme: light)" />
  <title>nlearn leaderboard</title>
  <meta name="description" content="Live leaderboard for the nlearn agent's optimization runs — pretraining, FlashAttention (forward + backward), and GEMM." />
  <meta name="robots" content="noindex" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='13' font-size='13'>▚</text></svg>" />
  <style>
    :root {
      --bg: #0b0d10;
      --bg-soft: #12151a;
      --line: #20262e;
      --fg: #e7ebf0;
      --fg-dim: #9aa4b1;
      --fg-mute: #5f6b78;
      --accent: #a5b4fc;
      --accent-dim: #818cf8;
      --err: #f87171;
      --radius: 12px;
      --mono: ui-monospace, "SF Mono", "JetBrains Mono", "Fira Code", Menlo, monospace;
      --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, Helvetica, Arial, sans-serif;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #fbfcfd;
        --bg-soft: #f1f4f7;
        --line: #e2e7ec;
        --fg: #11161c;
        --fg-dim: #4b5563;
        --fg-mute: #8b95a1;
        --accent: #0d9488;
        --accent-dim: #0f766e;
        --err: #dc2626;
      }
    }
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; overflow-x: hidden; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--sans);
      font-size: 16px;
      line-height: 1.5;
      letter-spacing: 0.1px;
      padding: max(16px, env(safe-area-inset-top)) clamp(14px, 5vw, 24px) calc(56px + env(safe-area-inset-bottom));
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    .wrap { width: 100%; margin: 0; }
    /* Controls stay a readable width (left-aligned); the data table goes full-bleed. */
    header, .blurb { max-width: 720px; }
    .controls, .sortbox { max-width: 640px; }
    header { padding: 6px 0 18px; }
    h1 { font-size: 1.5rem; margin: 0; letter-spacing: -0.02em; font-weight: 650; }
    h1 .mark { color: var(--accent); }
    .sub { color: var(--fg-dim); font-family: var(--mono); font-size: 0.8rem; margin-top: 6px; }

    /* Board selector (dropdown) + refresh */
    .controls { display: flex; gap: 8px; align-items: center; margin: 16px 0 12px; flex-wrap: wrap; }
    .board-select { flex: 1; min-width: 0; color: var(--fg); font-weight: 600; }
    .blurb { color: var(--fg-dim); font-size: 0.82rem; line-height: 1.5; margin: 2px 2px 16px; min-height: 18px; max-width: 720px; }

    /* Sort control (the list shows collapsed rows, so sorting is via this menu). */
    .sortbox { display: flex; gap: 6px; margin-bottom: 12px; max-width: 640px; }
    .sortbox #sort { flex: 1; min-width: 0; }
    select, .btn {
      appearance: none; background: var(--bg-soft); color: var(--fg);
      border: 1px solid var(--line); border-radius: 9px;
      font-family: var(--mono); font-size: 0.8rem; padding: 11px 12px; min-height: 46px;
      cursor: pointer; transition: border-color .15s, color .15s;
    }
    select:hover, .btn:hover { border-color: var(--accent-dim); }
    select { flex: 1; min-width: 0; background-image: none; }
    .btn { font-weight: 500; color: var(--fg-dim); }
    .btn:active { transform: scale(.97); }
    .dir { width: 52px; text-align: center; }

    .status { color: var(--fg-mute); font-family: var(--mono); font-size: 0.72rem; margin: 0 2px 12px; display: flex; gap: 8px; align-items: center; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); display: inline-block; }
    .dot.stale { background: var(--fg-mute); }
    .dot.err { background: var(--err); }

    /* Collapsed run rows (the list). Each row is a button that opens the run's
       detail page. Shows rank, name, the headline metric, and the date. */
    .rows { display: flex; flex-direction: column; max-width: 920px; }
    .run-row {
      display: flex; align-items: center; gap: 12px; width: 100%;
      padding: 15px 10px; background: transparent; border: 0;
      border-bottom: 1px solid var(--line); text-align: left; cursor: pointer;
      color: inherit; font: inherit; transition: background .12s;
    }
    .run-row:hover, .run-row:focus-visible { background: var(--bg-soft); outline: none; }
    .rank { color: var(--fg-mute); font-family: var(--mono); font-weight: 600; font-variant-numeric: tabular-nums; flex: 0 0 auto; }
    .run-row.top1 .rank { color: var(--accent); }
    .run-name { flex: 1; min-width: 0; display: flex; align-items: baseline; gap: 9px; }
    .name { color: var(--fg); font-family: var(--sans); font-weight: 600; letter-spacing: -0.01em;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .badge {
      font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.03em;
      padding: 0.14rem 0.55rem; border-radius: 999px; vertical-align: middle; white-space: nowrap; flex: 0 0 auto;
    }
    .badge.running { color: var(--accent); background: color-mix(in srgb, var(--accent) 12%, transparent); border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent); }
    .badge.done { color: var(--fg-mute); background: var(--bg-soft); border: 1px solid var(--line); }
    .run-meta { display: flex; align-items: center; gap: 18px; flex: 0 0 auto; }
    .run-primary { text-align: right; font-family: var(--mono); font-variant-numeric: tabular-nums; }
    .run-primary b { color: var(--accent); font-weight: 600; font-size: 0.95rem; }
    .run-primary small { display: block; color: var(--fg-mute); font-size: 0.64rem; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }
    .run-date { color: var(--fg-mute); font-family: var(--mono); font-size: 0.76rem; white-space: nowrap; min-width: 92px; text-align: right; }
    .chev { color: var(--fg-mute); font-size: 1.25rem; line-height: 1; flex: 0 0 auto; }

    @media (max-width: 560px) {
      .run-meta { flex-direction: column; align-items: flex-end; gap: 2px; }
      .run-primary small { display: none; }
      .run-date { min-width: 0; font-size: 0.72rem; }
    }

    /* Detail "page" — the expanded run (all numbers; charts later). */
    .back {
      display: inline-flex; align-items: center; gap: 6px; margin: 2px 0 18px;
      background: transparent; border: 0; color: var(--fg-dim); cursor: pointer;
      font-family: var(--mono); font-size: 0.82rem; padding: 8px 2px; min-height: 40px;
    }
    .back:hover { color: var(--accent); }
    .detail-name { font-size: 1.4rem; font-weight: 650; letter-spacing: -0.02em; }
    .detail-sub { color: var(--fg-mute); font-family: var(--mono); font-size: 0.78rem; margin-top: 9px; line-height: 1.5; }
    .metric-grid {
      display: grid; gap: 10px; margin-top: 22px;
      grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
    }
    .metric { background: var(--bg-soft); border: 1px solid var(--line); border-radius: var(--radius); padding: 14px; }
    .metric.primary { border-color: color-mix(in srgb, var(--accent) 45%, var(--line)); }
    .m-label { color: var(--fg-mute); font-family: var(--mono); font-size: 0.66rem; text-transform: uppercase; letter-spacing: 0.1em; }
    .m-value { color: var(--fg); font-family: var(--mono); font-size: 1.1rem; font-variant-numeric: tabular-nums; margin-top: 8px; word-break: break-word; }
    .metric.primary .m-value { color: var(--accent); }

    .empty, .err-msg { color: var(--fg-mute); font-family: var(--mono); text-align: center; padding: 48px 12px; font-size: 0.82rem; }
    .err-msg { color: var(--err); }

    /* Detail view hides the list controls; back button replaces them. */
    body[data-view="detail"] .controls,
    body[data-view="detail"] #blurb,
    body[data-view="detail"] #sortbox,
    body[data-view="detail"] .status { display: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>nlearn leaderboard <span class="mark">▚</span></h1>
      <div class="sub">live optimization runs from the nlearn agent</div>
    </header>

    <div class="controls">
      <select id="board-select" class="board-select" aria-label="Select leaderboard"></select>
      <button class="btn" id="refresh" aria-label="Refresh now">↻ Refresh</button>
    </div>
    <div class="blurb" id="blurb"></div>

    <!-- Mobile sort control (desktop sorts by double-clicking column headers). -->
    <div class="sortbox" id="sortbox">
      <select id="sort" aria-label="Sort by"></select>
      <button class="btn dir" id="dir" aria-label="Toggle sort direction">↑</button>
    </div>

    <div class="status">
      <span class="dot" id="dot"></span>
      <span id="statusText">loading…</span>
    </div>

    <div id="board"></div>
  </div>

  <script>
    // ---- Per-board column specs (data-driven). Values are read from
    // entry.metrics[key], falling back to entry[key]. ----
    const num = (d) => (n) => (n == null || isNaN(n)) ? null : Number(n).toFixed(d);
    const pct = (n) => (n == null || isNaN(n)) ? null : (Number(n) * 100).toFixed(1) + "%";
    const compact = (n) => {
      if (n == null || isNaN(n)) return null;
      n = Number(n);
      if (n >= 1e9) return (n / 1e9).toFixed(2) + "B";
      if (n >= 1e6) return (n / 1e6).toFixed(1) + "M";
      if (n >= 1e3) return (n / 1e3).toFixed(1) + "K";
      return String(n);
    };
    const sci = (n) => (n == null || isNaN(n)) ? null : Number(n).toExponential(1);
    const str = (s) => (s == null || s === "") ? null : String(s);

    const BOARDS = {
      pretraining: {
        label: "Pretraining",
        blurb: "Full model training runs — ranked by validation loss at a fixed compute (FLOP) budget. Lower is better.",
        rankKey: "loss_at_budget", rankDir: "asc", fallbackKey: "val_loss",
        columns: [
          { key: "loss_at_budget", label: "Loss @ budget", fmt: num(3), primary: true, dir: "asc" },
          { key: "val_loss", label: "Best val loss", fmt: num(3), dir: "asc" },
          { key: "train_loss", label: "Train loss", fmt: num(3), dir: "asc" },
          { key: "tflops", label: "TFLOP/s", fmt: num(2), dir: "desc" },
          { key: "mfu", label: "MFU", fmt: pct, dir: "desc" },
          { key: "tokens", label: "Tokens", fmt: compact, dir: "desc" },
          { key: "step_time", label: "Step time", fmt: (n) => { const v = num(2)(n); return v == null ? null : v + "s"; }, dir: "asc" },
          { key: "peak_mem_gb", label: "Peak mem", fmt: (n) => { const v = num(1)(n); return v == null ? null : v + " GB"; }, dir: "asc" },
          { key: "dataset", label: "Dataset", fmt: str },
        ],
      },
      flashattention: {
        label: "FlashAttention",
        blurb: "FlashAttention forward kernel (causal, M3 GPU via IREE). Ranked by throughput. Higher TFLOP/s is better.",
        rankKey: "tflops", rankDir: "desc",
        columns: [
          { key: "tflops", label: "TFLOP/s", fmt: num(2), primary: true, dir: "desc" },
          { key: "latency_ms", label: "Latency", fmt: (n) => { const v = num(3)(n); return v == null ? null : v + " ms"; }, dir: "asc" },
          { key: "speedup", label: "vs standard", fmt: (n) => { const v = num(2)(n); return v == null ? null : v + "×"; }, dir: "desc" },
          { key: "peak_mem_mb", label: "Peak mem", fmt: (n) => { const v = num(0)(n); return v == null ? null : v + " MB"; }, dir: "asc" },
          { key: "max_abs_err", label: "Max abs err", fmt: sci, dir: "asc" },
          { key: "shape", label: "Shape (H×S×D)", fmt: str },
          { key: "dtype", label: "dtype", fmt: str },
        ],
      },
      gemm: {
        label: "GEMM",
        blurb: "GEMM kernel benchmarks (M3 GPU via IREE). Ranked by throughput. Higher TFLOP/s is better.",
        rankKey: "tflops", rankDir: "desc",
        columns: [
          { key: "tflops", label: "TFLOP/s", fmt: num(2), primary: true, dir: "desc" },
          { key: "pct_peak", label: "% of peak", fmt: pct, dir: "desc" },
          { key: "latency_ms", label: "Latency", fmt: (n) => { const v = num(3)(n); return v == null ? null : v + " ms"; }, dir: "asc" },
          { key: "shape", label: "Shape (M×N×K)", fmt: str },
          { key: "dtype", label: "dtype", fmt: str },
          { key: "max_abs_err", label: "Max abs err", fmt: sci, dir: "asc" },
        ],
      },
      crossentropy: {
        label: "Cross-Entropy",
        blurb: "Fused cross-entropy (loss + dlogits) kernel — M3 GPU via IREE. Ranked by latency; the win is never materializing the (M×vocab) logits/one-hot, so peak memory is the long-context enabler. Lower latency / lower memory is better.",
        rankKey: "latency_ms", rankDir: "asc",
        columns: [
          { key: "latency_ms", label: "Latency", fmt: (n) => { const v = num(3)(n); return v == null ? null : v + " ms"; }, primary: true, dir: "asc" },
          { key: "speedup", label: "vs one-hot", fmt: (n) => { const v = num(2)(n); return v == null ? null : v + "×"; }, dir: "desc" },
          { key: "peak_mem_mb", label: "Peak mem", fmt: (n) => { const v = num(0)(n); return v == null ? null : v + " MB"; }, dir: "asc" },
          { key: "gb_s", label: "GB/s", fmt: num(1), dir: "desc" },
          { key: "max_abs_err", label: "Max abs err", fmt: sci, dir: "asc" },
          { key: "shape", label: "Shape (M×V)", fmt: str },
          { key: "dtype", label: "dtype", fmt: str },
        ],
      },
    };

    const API = new URLSearchParams(location.search).get("api") || "";
    const $ = (id) => document.getElementById(id);
    const cell = (e, key) => (e.metrics && e.metrics[key] != null) ? e.metrics[key] : e[key];

    // Route: "#board" = list view, "#board/runId" = that run's detail page.
    function parseHash() {
      const h = location.hash.replace(/^#/, "");
      const i = h.indexOf("/");
      if (i === -1) return { board: h, id: null };
      return { board: h.slice(0, i), id: decodeURIComponent(h.slice(i + 1)) };
    }
    let { board: current, id: currentRunId } = parseHash();
    if (!BOARDS[current]) { current = "pretraining"; currentRunId = null; }
    let sortKey = null, sortDir = null;
    let lastData = [];
    let lastFetch = 0;

    // Synthetic sort keys for the Run (name) and Updated (timestamp) columns.
    const NAME_KEY = "__name", TIME_KEY = "__updated";

    // ---- Board selector (dropdown) ----
    const boardSel = $("board-select");
    for (const id of Object.keys(BOARDS)) {
      const o = document.createElement("option");
      o.value = id; o.textContent = BOARDS[id].label;
      boardSel.appendChild(o);
    }
    boardSel.onchange = (e) => selectBoard(e.target.value);

    function selectBoard(id) {
      current = id;
      currentRunId = null;
      location.hash = id;
      sortKey = null; sortDir = null; // reset to board default
      boardSel.value = id;
      buildSortOptions();
      $("blurb").textContent = BOARDS[id].blurb;
      render();
      load();
    }

    // Navigation between the list and a run's detail page.
    function openRun(id) {
      currentRunId = id;
      location.hash = current + "/" + encodeURIComponent(id);
      window.scrollTo(0, 0);
      render();
    }
    function backToList() {
      currentRunId = null;
      location.hash = current;
      render();
    }

    function buildSortOptions() {
      const sel = $("sort");
      sel.innerHTML = "";
      const opts = [[NAME_KEY, "Run"]];
      for (const c of BOARDS[current].columns) {
        if (c.fmt === str) continue; // text columns rarely useful to sort by on mobile
        opts.push([c.key, c.label]);
      }
      opts.push([TIME_KEY, "Updated"]);
      for (const [val, label] of opts) {
        const o = document.createElement("option");
        o.value = val; o.textContent = "Sort: " + label;
        sel.appendChild(o);
      }
      sel.value = effectiveSortKey();
      $("dir").textContent = effectiveSortDir() === "asc" ? "↑" : "↓";
    }

    const effectiveSortKey = () => sortKey || BOARDS[current].rankKey;
    function defaultDir(key) {
      if (key === NAME_KEY) return "asc";
      if (key === TIME_KEY) return "desc";
      const col = BOARDS[current].columns.find((c) => c.key === key);
      return (col && col.dir) || BOARDS[current].rankDir;
    }
    function effectiveSortDir() { return sortDir || defaultDir(effectiveSortKey()); }

    // Set the sort column; clicking the active column again flips direction.
    function sortByKey(key) {
      if (effectiveSortKey() === key) {
        sortDir = effectiveSortDir() === "asc" ? "desc" : "asc";
      } else {
        sortKey = key; sortDir = null; // start in the column's natural direction
      }
      buildSortOptions();
      render();
    }

    $("sort").onchange = (e) => { sortKey = e.target.value; sortDir = null; buildSortOptions(); render(); };
    $("dir").onclick = () => { sortDir = effectiveSortDir() === "asc" ? "desc" : "asc"; buildSortOptions(); render(); };
    $("refresh").onclick = () => load();

    // Click a row → open its detail page; click "← back" → return to the list.
    $("board").addEventListener("click", (ev) => {
      if (ev.target.closest(".back")) { backToList(); return; }
      const row = ev.target.closest(".run-row");
      if (row) openRun(row.dataset.id);
    });

    function sortValue(e, key) {
      if (key === NAME_KEY) return (e.name || e.id || "").toLowerCase();
      if (key === TIME_KEY) { const t = Date.parse(e.updated_at || ""); return isNaN(t) ? null : t; }
      const v = cell(e, key);
      if (v == null || v === "") return null;
      const n = Number(v);
      return isNaN(n) ? String(v).toLowerCase() : n;
    }

    function sortEntries(entries) {
      const key = effectiveSortKey(), dir = effectiveSortDir(), fb = BOARDS[current].fallbackKey;
      const cmp = (a, b) => {
        if (typeof a === "number" && typeof b === "number") return a - b;
        return String(a) < String(b) ? -1 : String(a) > String(b) ? 1 : 0;
      };
      return [...entries].sort((a, b) => {
        let av = sortValue(a, key), bv = sortValue(b, key);
        // Entries missing the rank metric sort last, then by fallback.
        if (av == null && bv == null && fb) { av = sortValue(a, fb); bv = sortValue(b, fb); }
        if (av == null && bv == null) return 0;
        if (av == null) return 1;   // nulls always last, regardless of direction
        if (bv == null) return -1;
        return dir === "asc" ? cmp(av, bv) : -cmp(av, bv);
      });
    }

    function render() {
      document.body.dataset.view = currentRunId ? "detail" : "list";
      if (currentRunId) renderDetail();
      else renderList();
    }

    // Pick the headline metric for a collapsed row: the primary column, or the
    // fallback metric when the primary is absent for this run.
    function headlineFor(e, spec) {
      const pcol = spec.columns.find((c) => c.primary) || spec.columns[0];
      let col = pcol, raw = cell(e, pcol.key);
      if (raw == null && spec.fallbackKey) {
        const fc = spec.columns.find((c) => c.key === spec.fallbackKey);
        if (fc && cell(e, fc.key) != null) { col = fc; raw = cell(e, fc.key); }
      }
      const v = col.fmt ? col.fmt(raw) : raw;
      return { label: col.label, value: v == null ? "—" : v };
    }

    function renderList() {
      const host = $("board");
      const entries = sortEntries(lastData);
      if (!entries.length) {
        host.innerHTML = lastFetch
          ? '<div class="empty">No entries yet. Runs and kernel benchmarks will appear here as they post.</div>'
          : '<div class="empty">Loading…</div>';
        return;
      }
      const spec = BOARDS[current];
      let html = '<div class="rows">';
      entries.forEach((e, i) => {
        const top = i === 0 ? " top1" : "";
        const badge = e.status === "running"
          ? '<span class="badge running">running</span>'
          : '<span class="badge done">done</span>';
        const h = headlineFor(e, spec);
        html += `<button type="button" class="run-row${top}" data-id="${esc(e.id)}">`
          + `<span class="rank">#${i + 1}</span>`
          + `<span class="run-name"><span class="name">${esc(e.name || e.id)}</span>${badge}</span>`
          + `<span class="run-meta">`
          +   `<span class="run-primary"><b>${esc(h.value)}</b><small>${esc(h.label)}</small></span>`
          +   `<span class="run-date" title="${esc(e.updated_at || "")}">${esc(fmtDate(e.updated_at))}</span>`
          + `</span>`
          + `<span class="chev" aria-hidden="true">›</span>`
          + `</button>`;
      });
      html += "</div>";
      host.innerHTML = html;
    }

    function renderDetail() {
      const host = $("board");
      const spec = BOARDS[current];
      const entries = sortEntries(lastData);
      const idx = entries.findIndex((e) => e.id === currentRunId);
      const e = idx >= 0 ? entries[idx] : null;
      const backBtn = `<button type="button" class="back">← ${esc(spec.label)}</button>`;
      if (!e) {
        host.innerHTML = backBtn + (lastFetch
          ? '<div class="empty">Run not found on this board.</div>'
          : '<div class="empty">Loading…</div>');
        return;
      }
      const badge = e.status === "running"
        ? '<span class="badge running">running</span>'
        : '<span class="badge done">done</span>';

      const metrics = [];
      for (const c of spec.columns) {
        const raw = cell(e, c.key);
        const v = c.fmt ? c.fmt(raw) : raw;
        metrics.push({ label: c.label, value: v == null ? "—" : String(v), primary: !!c.primary });
      }
      // Run metadata after the board's own metrics.
      metrics.push({ label: "Status", value: e.status || "—" });
      metrics.push({ label: "Created", value: fmtDate(e.created_at) });
      metrics.push({ label: "Run id", value: e.id });

      let html = backBtn;
      html += `<div class="detail-head"><span class="detail-name">${esc(e.name || e.id)}</span> ${badge}`
        + `<div class="detail-sub">${esc(spec.label)} · rank #${idx + 1} of ${entries.length} · updated ${esc(fmtDate(e.updated_at))}</div></div>`;
      html += '<div class="metric-grid">';
      for (const m of metrics) {
        html += `<div class="metric${m.primary ? " primary" : ""}">`
          + `<div class="m-label">${esc(m.label)}</div>`
          + `<div class="m-value">${esc(m.value)}</div></div>`;
      }
      html += "</div>";
      host.innerHTML = html;
    }

    function fmtDate(iso) {
      if (!iso) return "—";
      const d = new Date(iso);
      if (isNaN(d.getTime())) return "—";
      return d.toLocaleString(undefined, {
        month: "short", day: "numeric",
        hour: "2-digit", minute: "2-digit", hour12: false,
      });
    }

    function esc(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }

    async function load() {
      try {
        const r = await fetch(`${API}/api/${current}`, { cache: "no-store" });
        if (!r.ok) throw new Error("HTTP " + r.status);
        const data = await r.json();
        lastData = Array.isArray(data.entries) ? data.entries : [];
        lastFetch = Date.now();
        setStatus("ok");
        render();
      } catch (err) {
        setStatus("err", err.message);
        if (!lastData.length) $("board").innerHTML = `<div class="err-msg">Couldn't load the leaderboard (${esc(err.message)}).</div>`;
      }
    }

    function setStatus(state, msg) {
      const dot = $("dot");
      if (state === "err") {
        dot.className = "dot err";
        $("statusText").textContent = "offline — " + (msg || "retrying");
        return;
      }
      tickStatus();
    }
    function tickStatus() {
      if (!lastFetch) return;
      const secs = Math.round((Date.now() - lastFetch) / 1000);
      const dot = $("dot");
      dot.className = secs > 45 ? "dot stale" : "dot";
      const ago = secs < 5 ? "just now" : secs < 60 ? `${secs}s ago` : `${Math.round(secs / 60)}m ago`;
      $("statusText").textContent = `${lastData.length} ${lastData.length === 1 ? "entry" : "entries"} · updated ${ago}`;
    }

    // Init
    boardSel.value = current;
    buildSortOptions();
    $("blurb").textContent = BOARDS[current].blurb;
    render();
    load();
    setInterval(load, 15000);   // live refresh
    setInterval(tickStatus, 1000);
    window.addEventListener("hashchange", () => {
      const { board, id } = parseHash();
      const b = BOARDS[board] ? board : "pretraining";
      if (b !== current) {
        current = b; currentRunId = id;
        boardSel.value = b; sortKey = null; sortDir = null;
        buildSortOptions(); $("blurb").textContent = BOARDS[b].blurb;
        render(); load();
      } else if (id !== currentRunId) {
        currentRunId = id;
        window.scrollTo(0, 0);
        render();
      }
    });
  </script>
</body>
</html>
